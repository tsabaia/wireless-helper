name: Build Android APK

# Trigger the workflow on pushes, pull requests, AND manually
on:
  push:
    branches:
      - '**' # Runs automatically on push to any branch
  pull_request:
    branches:
      - '**' # Runs automatically on pull requests
  workflow_dispatch: # This enables the "Run workflow" button in the GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK (Java 17 is standard for modern Android projects)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Grant execute permission to the Gradle wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Build the Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Upload the generated APK so it can be downloaded from the GitHub UI
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # Standard path for Android Studio generated APKs. 
          # Update 'app' if your main module has a different name.
          path: app/build/outputs/apk/debug/app-debug.apk
